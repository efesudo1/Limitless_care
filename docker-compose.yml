services:
  postgres:
    image: postgres:16-alpine
    container_name: limitlesscare-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: limitlesscare
      POSTGRES_USER: limitless
      POSTGRES_PASSWORD: limitless_dev_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U limitless -d limitlesscare"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
